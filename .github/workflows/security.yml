name: Security Tests with Nuclei

on:
  push:
    branches: [main, 006-owasp-security-tests]
  pull_request:
    branches: [main, 006-owasp-security-tests]

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint tests/security/

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  security-scan:
    name: Security Tests with Nuclei
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Nuclei scan
        run: >
          docker run --rm
          -v ${{ github.workspace }}/reports:/reports
          projectdiscovery/nuclei:latest
          -u https://www.saucedemo.com
          -t http/misconfiguration
          -t http/exposures
          -severity medium,high,critical
          -jsonl
          -o /reports/nuclei-results.json
          -no-interactsh
          || echo "[]" > /reports/nuclei-results.json

      - name: Verify Nuclei results file exists
        run: |
          if [ ! -f reports/nuclei-results.json ]; then
            echo "ERROR: Nuclei results file not generated"
            exit 1
          fi
          echo "Nuclei results file exists: $(wc -l < reports/nuclei-results.json) lines"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify SauceDemo credentials are configured
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
        run: |
          if [ -z "$SAUCE_USERNAME" ] || [ -z "$SAUCE_PASSWORD" ]; then
            echo "ERROR: Missing SAUCE_USERNAME or SAUCE_PASSWORD secrets"
            exit 1
          fi
          echo "Credentials configured: ✓"

      - name: Run security tests with Nuclei
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
        run: npx playwright test --project=security

      - name: Run security tests without Nuclei scanning
        if: always()
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
          NUCLEI_SKIP: '1'
        run: npx playwright test tests/security/access-control.spec.ts tests/security/crypto-failures.spec.ts tests/security/injection.spec.ts tests/security/auth-security.spec.ts tests/security/headers-security.spec.ts --project=security

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-results/

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  baseline-tests:
    name: Baseline Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Verify SauceDemo credentials are configured
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
        run: |
          if [ -z "$SAUCE_USERNAME" ] || [ -z "$SAUCE_PASSWORD" ]; then
            echo "ERROR: Missing SAUCE_USERNAME or SAUCE_PASSWORD secrets"
            exit 1
          fi
          echo "Credentials configured: ✓"

      - name: Run baseline E2E tests
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
        run: npx playwright test --project=chromium --project=firefox --project=webkit

      - name: Run baseline API tests
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
        run: npx playwright test --project=api

      - name: Upload baseline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-report
          path: playwright-report/
