name: Security Tests with ZAP

on:
  push:
    branches: [main, 006-owasp-security-tests]
  pull_request:
    branches: [main, 006-owasp-security-tests]

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint tests/security/

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  security-scan:
    name: Security Tests with ZAP Proxy
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      zap:
        image: owasp/zap2docker-stable:latest
        options: >-
          --health-cmd "curl -f http://localhost:8080/json/core/view/version/ || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Wait for ZAP to be ready
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8080/json/core/view/version/; do echo waiting for ZAP; sleep 1; done'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run global setup
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
        run: npx playwright install && npm run typecheck

      - name: Run security tests with ZAP
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
          ZAP_PROXY: http://localhost:8080
        run: npx playwright test --project=security

      - name: Run security tests without ZAP proxy
        if: always()
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
          ZAP_PROXY_SKIP: '1'
        run: npx playwright test tests/security/access-control.spec.ts tests/security/crypto-failures.spec.ts tests/security/injection.spec.ts tests/security/auth-security.spec.ts --project=security

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-results/

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  baseline-tests:
    name: Baseline Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run baseline E2E tests
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
        run: npx playwright test --project=chromium --project=firefox --project=webkit

      - name: Run baseline API tests
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
        run: npx playwright test --project=api

      - name: Upload baseline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-report
          path: playwright-report/
